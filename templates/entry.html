<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{.Entry.PCBName}}{{if .Entry.PCBRevision}} {{.Entry.PCBRevision}}{{end}} — {{.Entry.FirmwareName}} — kbfirmware</title>
  <meta name="description" content="{{.Entry.FirmwareName}} firmware for {{.Entry.PCBName}}{{if .Entry.PCBRevision}} {{.Entry.PCBRevision}}{{end}}{{if .Entry.PCBDesigner}} by {{.Entry.PCBDesigner}}{{end}}. Download from kbfirmware.">
  <link rel="canonical" href="{{.Canonical}}">
  <link rel="icon" type="image/svg+xml" href="{{ asset "favicon.svg" }}">
  <link rel="stylesheet" href="{{ asset "style.css" }}">
  {{template "theme-init"}}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <a href="/" style="text-decoration:none;color:inherit"><h1>kbfirmware</h1></a>
        <span class="header-subtitle">Keyboard PCB Firmware Repository</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main-content">
    <p style="margin-bottom:1.5rem"><a href="{{.Canonical}}">← Back to search</a></p>

    {{template "entry-card" .Entry}}
  </main>

  <dialog id="flag-dialog" aria-labelledby="flag-dialog-title">
    <div class="dialog-inner">
      <h2 id="flag-dialog-title">Report an issue</h2>
      <p class="dialog-desc">Describe the issue with this firmware entry (e.g. wrong file, incorrect information, malicious content).</p>
      <textarea id="flag-reason" placeholder="Describe the issue…" rows="4"></textarea>
      <div class="dialog-actions">
        <button id="flag-cancel" class="btn-secondary">Cancel</button>
        <button id="flag-submit" class="btn-danger">Submit Report</button>
      </div>
    </div>
  </dialog>

  <footer class="site-footer">
    <p>kbfirmware &mdash; keyboard PCB firmware repository</p>
  </footer>

  <script src="{{ asset "script.js" }}" defer></script>
</body>
</html>
