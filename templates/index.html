<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Search and download keyboard PCB firmware files. Find QMK, VIA, and other firmware for your keyboard PCB by name, designer, or tag.">
  <title>kbfirmware — Keyboard PCB Firmware Search</title>
  <link rel="icon" type="image/svg+xml" href="{{ asset "favicon.svg" }}">
  <link rel="stylesheet" href="{{ asset "style.css" }}">
  {{template "theme-init"}}
  <script src="{{ asset "script.js" }}" defer></script>
</head>
<body>
  {{template "site-header" .}}

  <div class="search-bar-wrapper">
    <div class="search-bar-inner">
      <input type="search" id="search" placeholder="Search by name, PCB, designer, tags…" autofocus autocomplete="off">
      <span class="search-count" id="search-count"></span>
      <a href="/request" id="request-btn" class="request-btn">+ Contribute</a>
    </div>
  </div>

  <main class="main-content">
    <div id="no-results" class="hidden">
      <p>No entries match your search. Know this firmware? <a href="/request" class="no-results-contribute">Contribute it ↗</a></p>
    </div>
    <div id="entries-container">
      <div class="skeleton-entry" aria-hidden="true">
        <div class="skeleton-header"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-badge"></div></div>
        <div class="skeleton-line sk-meta"></div>
        <div class="skeleton-line sk-file"></div>
      </div>
      <div class="skeleton-entry" aria-hidden="true">
        <div class="skeleton-header"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-badge"></div></div>
        <div class="skeleton-line sk-meta"></div>
        <div class="skeleton-line sk-file"></div>
        <div class="skeleton-line sk-file" style="width:50%"></div>
      </div>
      <div class="skeleton-entry" aria-hidden="true">
        <div class="skeleton-header"><div class="skeleton-line sk-title"></div></div>
        <div class="skeleton-line sk-meta"></div>
        <div class="skeleton-line sk-file"></div>
      </div>
      <div class="skeleton-entry" aria-hidden="true">
        <div class="skeleton-header"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-badge"></div></div>
        <div class="skeleton-line sk-meta"></div>
        <div class="skeleton-line sk-file"></div>
      </div>
    </div>
  </main>

  {{template "flag-dialog" .}}

  {{template "site-footer" .}}
</body>
</html>
